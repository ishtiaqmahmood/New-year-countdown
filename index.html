<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A beautiful and simple New Year countdown timer to track time until the next year begins.">
  <meta name="keywords" content="New Year, Countdown, Timer, JavaScript, CSS, HTML">
  <link rel="stylesheet" href="style.css">
  <title>New Year Countdown</title>
</head>
<body>
  <div id="year" class="year" aria-hidden="true"></div>

  <h1>New Year Countdown</h1>

  <div id="countdown" class="countdown" role="timer" aria-live="polite" style="display: none;">
    <div class="time">
      <h2 id="days">00</h2>
      <small>days</small>
    </div>
    <div class="time">
      <h2 id="hours">00</h2>
      <small>hours</small>
    </div>
    <div class="time">
      <h2 id="minutes">00</h2>
      <small>minutes</small>
    </div>
    <div class="time">
      <h2 id="seconds">00</h2>
      <small>seconds</small>
    </div>
  </div>

  <img
    src="./img/spinner.gif"
    alt="Loading..."
    id="loading"
    class="loading"
  />

  <script src="script.js"></script>
</body>
</html>
